spring.application.name=Kill-e-test
spring.docker.compose.enabled=false
spring.datasource.url=jdbc:h2:mem:kille;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;NON_KEYWORDS=POSITION;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=true
yandex.cloud.storage.endpoint=https://storage.yandexcloud.net
yandex.cloud.storage.region=ru-central1
yandex.cloud.storage.access-key=test-access-key
yandex.cloud.storage.secret-key=test-secret-key
yandex.cloud.storage.bucket=test-bucket
yandex.cloud.storage.chapters-prefix=books
yandex.cloud.storage.path-style-access-enabled=true
yandex.cloud.storage.presigned-url-expiration-hours=1
